<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projets SAE — Salma Trachi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .semester-tabs {
    display: flex; gap: 0.65rem; flex-wrap: wrap;
    padding: 2rem 2rem 0; max-width: 1100px; margin: 0 auto;
  }
  .tab-btn {
    padding: 0.45rem 1.15rem; border-radius: 30px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-mid); font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .tab-btn:hover { border-color: var(--avocado); color: var(--avocado); }
  .tab-btn.active { background: var(--avocado); border-color: var(--avocado); color: var(--mist-light); }
  .projects-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem; padding: 1.5rem 2rem 3rem;
    max-width: 1100px; margin: 0 auto;
  }
  .project-card {
    background: var(--white); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    text-decoration: none; display: block;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .project-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(78,84,36,0.12); }
  .project-card-top {
    background: var(--avocado); padding: 1.25rem 1.25rem 1rem;
  }
  .project-card-top .comp-label {
    font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(232,235,199,0.6);
    font-weight: 500; margin-bottom: 0.4rem;
  }
  .project-card-top h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 400;
    color: var(--mist-light); line-height: 1.35;
  }
  .project-card-body { padding: 1rem 1.25rem 1.25rem; }
  .project-card-body p { font-size: 0.83rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 0.85rem; }
  .project-link {
    display: inline-flex; align-items: center; gap: 0.3rem;
    margin-top: 0.75rem; font-size: 0.8rem; font-weight: 500;
    color: var(--avocado);
  }
  .project-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="mobile-menu" id="mobileMenu"></div>
<nav id="main-nav"></nav>

<div class="page-header">
  <h2>Projets SAE</h2>
  <p>Mes travaux pratiques réalisés en BUT Science des Données</p>
</div>

<div class="semester-tabs">
  <button class="tab-btn active" onclick="filterSemester('all', this)">Tous</button>
  <button class="tab-btn" onclick="filterSemester('S1', this)">Semestre 1</button>
  <button class="tab-btn" onclick="filterSemester('S2', this)">Semestre 2</button>
  <button class="tab-btn" onclick="filterSemester('transversal', this)">Transversal</button>
</div>

<div class="projects-grid" id="projects-grid"></div>

<script>
const projects = [
  { id:1,  semester:'S1', comp:'Compétence 1', title:'Écriture et lecture de fichiers de données (JSON)', short:'Conversion d\'un fichier JSON de qualité de l\'air en CSV structuré avec Python.', tags:['Python','JSON','Fichiers'], team:'Travail en binôme' },
  { id:2,  semester:'S1', comp:'Compétence 1', title:'Reporting à partir de données stockées dans un SGBD relationnel', short:'Application Excel de suivi des résultats académiques du BUT SD, avec base de données et automatisation VBA.', tags:['Excel','VBA','Reporting'], team:'Travail en binôme' },
  { id:3,  semester:'S1', comp:'Compétence 2', title:'Préparation et synthèse d\'un tableau de données en vue d\'une analyse exploratoire simple', short:'Analyse exploratoire d\'une enquête étudiante (téléphone, sommeil, habitudes de vie) avec Sphinx.', tags:['Sphinx','Enquête','Exploration'], team:'Travail en binôme' },
  { id:4,  semester:'S1', comp:'Compétence 3', title:'Apprendre en situation la production de données en entreprise', short:'Analyse de données démographiques INSEE de plusieurs communes françaises avec Excel.', tags:['Entreprise','INSEE','Excel'], team:'Travail en équipe' },
  { id:5,  semester:'S1', comp:'Compétence 3', title:'Présentation en anglais d\'un territoire économique et culturel', short:'Recherche et présentation orale, en français et en anglais, d\'une ville et de sa ville jumelée.', tags:['Anglais','Présentation','Territoire'], team:'Travail en équipe' },
  { id:6,  semester:'S1', comp:'Compétence 3', title:'Mise en œuvre d\'une enquête', short:'Conception d\'un questionnaire Sphinx sur l\'influence des réseaux sociaux auprès des jeunes.', tags:['Enquête','Sphinx','Questionnaire'], team:'Travail en équipe' },
  { id:7,  semester:'S2', comp:'Compétence 1', title:'Analyse de données, reporting et datavisualisation', short:'Tableau de bord Qualyse : analyse de résultats de tests PCR sur des cheptels agricoles.', tags:['Qualyse','Python','SQL','Metabase','DataViz'], team:'Travail en équipe' },
  { id:8,  semester:'S2', comp:'Compétence 1', title:'Conception et implémentation d\'une base de données', short:'Modélisation et création de la base de données de GreenSD, entreprise de logistique bas-carbone.', tags:['BDD','SQL','Modélisation'], team:'Travail en équipe' },
  { id:9,  semester:'S2', comp:'Compétence 2', title:'Estimation par échantillonnage', short:'Échantillonnage et estimation sous R : population de l\'Occitanie et enquête sportive étudiante.', tags:['R','Échantillonnage','Statistiques'], team:'Travail en binôme' },
  { id:10, semester:'S2', comp:'Compétence 2', title:'Régression sur des données réelles', short:'Modèle de régression linéaire prédisant le prix de logements à Niort sous R.', tags:['Régression','R','Immobilier'], team:'Travail en binôme' },
  { id:11, semester:'S2', comp:'Compétence 3', title:'Construction et présentation d\'indicateurs de performance', short:'Calcul de KPI financiers du groupe Fleury-Michon et de sa filiale Fleury-Michon LS.', tags:['KPI','Finance','Tableau de bord'], team:'Travail en binôme' },
  { id:12, semester:'transversal', comp:'Compétence transversale', title:'Datavisualisation', short:'Infographie sur les dynamiques démographiques des grandes villes de la région PACA, dans le cadre d\'un concours national.', tags:['DataViz','INSEE','Infographie'], team:'Travail en équipe' },
  { id:13, semester:'transversal', comp:'Compétence transversale', title:'Portfolio', short:'Conception et réalisation du portfolio numérique présentant l\'ensemble des SAE.', tags:['Portfolio','Web','GitHub'], team:'Travail individuel' },
];

let currentFilter = 'all';

function renderProjects(filter) {
  currentFilter = filter;
  const grid = document.getElementById('projects-grid');
  const filtered = filter === 'all' ? projects : projects.filter(p => p.semester === filter);
  grid.innerHTML = filtered.map(p => `
    <a class="project-card" href="projets/projet-${p.id}.html">
      <div class="project-card-top">
        <div class="comp-label">${p.comp} · ${p.semester === 'transversal' ? 'Transversal' : p.semester}</div>
        <h3>${p.title}</h3>
      </div>
      <div class="project-card-body">
        <p>${p.short}</p>
        <div>${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
        ${p.team ? `<div style="font-size:0.78rem; color:var(--avocado-mid); margin-top:0.4rem;">👥 ${p.team}</div>` : ''}
        <span class="project-link">Voir le projet <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </div>
    </a>
  `).join('');
}

function filterSemester(sem, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects(sem);
}

renderProjects('all');
</script>

<footer>
  Portfolio réalisé dans le cadre du BUT Science des Données · IUT de Poitiers, campus de Niort · 2024–2025
</footer>

<script src="css/nav.js"></script>
</body>
</html>
